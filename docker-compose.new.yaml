version: '3.8'

services:
  oneclickvirt-mysql:
    image: mariadb:10.11
    container_name: oneclickvirt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123456
      MYSQL_DATABASE: oneclickvirt
      MYSQL_USER: oneclickvirt
      MYSQL_PASSWORD: virtuser123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - oneclickvirt

  oneclickvirt-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: oneclickvirt:fixed
    container_name: oneclickvirt-init
    depends_on:
      - oneclickvirt-mysql
    environment:
      DB_HOST: oneclickvirt-mysql
      DB_PORT: 3306
      DB_NAME: oneclickvirt
      DB_USER: oneclickvirt
      DB_PASS: virtuser123456
      REDIS_HOST: oneclickvirt-redis
      REDIS_PORT: 6379
      REDIS_PASS:
      TG_BOT_TOKEN: 8118138315:AAETEX9LyK5aIGRhx28QPvDNogiRF1flWcI
      QQ_APP_ID:
      QQ_APP_KEY:
      GO_ENV: production
    command: /app/init.sh
    restart: "no"

  oneclickvirt-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: oneclickvirt:fixed
    container_name: oneclickvirt-api
    depends_on:
      - oneclickvirt-mysql
      - oneclickvirt-redis
    environment:
      DB_HOST: oneclickvirt-mysql
      DB_PORT: 3306
      DB_NAME: oneclickvirt
      DB_USER: oneclickvirt
      DB_PASS: virtuser123456
      REDIS_HOST: oneclickvirt-redis
      REDIS_PORT: 6379
      REDIS_PASS:
      TG_BOT_TOKEN: 8118138315:AAETEX9LyK5aIGRhx28QPvDNogiRF1flWcI
      QQ_APP_ID:
      QQ_APP_KEY:
      GO_ENV: production
    ports:
      - "8890:8080"
    restart: unless-stopped
    networks:
      - oneclickvirt

  oneclickvirt-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: oneclickvirt:fixed
    container_name: oneclickvirt-web
    depends_on:
      - oneclickvirt-api
    environment:
      GO_ENV: production
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - oneclickvirt

  oneclickvirt-redis:
    image: redis:latest
    container_name: oneclickvirt-redis
    command: redis-server --requirepass ""
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - oneclickvirt

volumes:
  mysql_data:
  redis_data:

networks:
  oneclickvirt:
